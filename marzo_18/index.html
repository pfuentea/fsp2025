        <script>
            // aca poner el script
            function validar(){
                // estamos trabajando con el DOM
                let rut=document.getElementById('rut').value;
                let p1=document.getElementById('resultado');
                if (validarRut(rut)) 
                {

                }
            }
            function cambiar_texto(){
                let items1=document.getElementsByClassName("nivel_1");
                let items2=document.getElementsByClassName("nivel_2");
                // voy a tener dos  arreglos con los elementos de clase nivel_1 y nivel_2

                for (let i=0;i < items1.length; i++){
                    if(i%2==0){
                        items1[i].style.color="blue";
                    }
                    else{
                         items1[i].style.color="green";
                    }
                }
                for (let i=0;i < items2.length; i++){
                    items2[i].style.color="yellow";
                }
            }
            function cambiar_parrafo(size){
                let parrafos=document.getElementsByTagName("p")
                let new_size=size+"px";
                // obtengo un arreglo con todos los elementos de etiqueta p
                for (let i=0;i < parrafos.length; i++){
                    parrafos[i].style.fontSize=new_size;
                }
            }
            
        </script>
