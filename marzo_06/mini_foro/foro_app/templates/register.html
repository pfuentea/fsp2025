{% extends 'base.html' %}

{% block title %}
    Mini Foro - Register
{% endblock %}

{% block titulo %}
    <h1>MI FORO</h1>
{% endblock %}

{% block contenido %}
<h3>Registro</h3>
<form method="POST" class="card card-body">
    {% csrf_token %}
    {% for field in form %}
    <div class="mb-3">
        <label class="form-label">{{field.label}}</label>
        {{field}}
        {% if fields.errors %}
            {{field.errors}}
        {% endif%}
        {% endfor %}
    </div>
    <button class="btn btn-primary">Crear Cuenta</button>
</form>
{% endblock %}
