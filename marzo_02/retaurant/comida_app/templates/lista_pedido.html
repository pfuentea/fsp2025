{% extends 'base.html' %}

{% block title %}
    SGA
{% endblock %}

{% block titulo %}
    <h1>TENEMOS HAMBRE FAST FOOD</h1>
{% endblock %}

{% block contenido %}
<div class="container mt-4">
    <table>
        <thead>
            <th>Número de pedido</th>
            <th>Fecha</th>
        </thead>
        <tbody>
            {% for p in pedidos %}
            <tr>
                <td>{{p.id}}</td>
                <td>{{p.created_at}}</td>
            </tr>
            {% endfor %}

        </tbody>

    </table>

    
</div>
   

{% endblock %}
