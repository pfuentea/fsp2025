{% extends "base.html" %}
{% block contenido %}

<div class="container">
    <h2>Iniciar Sesión</h2>

    {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{{message.tags }}">
            {{message}}
        </div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        {{form.as_p}}
        <button type="submit" class="btn btn-primary">Entrar</button>
    </form>
    <p class="mt-3">
        ¿No tienes cuenta?
        <a href="{% url 'core_auth:register' %}">Registrate aquí</a>
    </p>

</div>

{% endblock %}
