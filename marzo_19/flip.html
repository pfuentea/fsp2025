<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="flip.css">
    <script

<body>

    <div class="card">

                FRENTE
            </div>
            <div class="card-back">

        </div>

<script>

            $(this).toggleClass('flipped');
        })
    });
</script>
</body>
</html>
